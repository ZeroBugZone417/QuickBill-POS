<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBill POS - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-container">
    <div class="login-box fade-in">
        <div class="sidebar-logo" style="justify-content: center; margin-bottom: 20px;">
            <i class="fas fa-bolt"></i> <span>QuickBill POS</span>
        </div>
        <h2 style="text-align: center; margin-bottom: 30px; font-weight: 500;">Welcome Back</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="text" id="username" placeholder="Enter username" style="padding-left: 40px;" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="password" id="password" placeholder="Enter password" style="padding-left: 40px; padding-right: 40px;" required>
                    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 14px; top: 14px; color: var(--text-muted); cursor: pointer;"></i>
                </div>
            </div>

            <div id="errorMessage" style="color: #ef4444; font-size: 14px; margin-bottom: 15px; display: none; text-align: center;">
                Invalid username or password.
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">
                LOGIN
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted);">
            Default: admin123 / admin123
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = passwordInput.value;

            try {
                const res = await axios.post('/api/login', { username, password });
                if (res.data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = '/index.html';
                }
            } catch (err) {
                errorMessage.style.display = 'block';
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
